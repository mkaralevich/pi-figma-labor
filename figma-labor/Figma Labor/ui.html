<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 11px;
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #000);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 8px 0 12px;
      height: 36px;
      flex-shrink: 0;
      gap: 8px;
    }

    #connection {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #999;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #status-dot.connected    { background: #1bc47d; }
    #status-dot.disconnected { background: #f24e1e; }
    #status-dot.connecting   { background: #f7a100; }

    #status-text {
      color: var(--figma-color-text-secondary, #666);
    }

    #reconnect-btn {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--figma-color-border, #ccc);
      background: transparent;
      cursor: pointer;
      color: var(--figma-color-text, #000);
      display: none;
    }
    #reconnect-btn:hover { background: var(--figma-color-bg-hover, #f5f5f5); }

    #toggle-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: var(--figma-color-text-tertiary, #999);
      font-size: 10px;
      flex-shrink: 0;
      transition: transform 0.15s;
      border: none;
      background: transparent;
    }
    #toggle-btn:hover:not(:disabled) { background: var(--figma-color-bg-hover, #f5f5f5); }
    #toggle-btn.open { transform: rotate(180deg); }
    #toggle-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--figma-color-border, #e5e5e5);
      flex-shrink: 0;
    }

    /* ── Last command ── */
    #last-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      height: 32px;
      flex-shrink: 0;
    }

    #last-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #ccc;
    }
    #last-status-dot.ok      { background: #1bc47d; }
    #last-status-dot.err     { background: #f24e1e; }
    #last-status-dot.pending { background: #f7a100; }

    #last-cmd-text {
      flex: 1;
      font-weight: 500;
      color: var(--figma-color-text-secondary, #666);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #last-cmd-text.active { color: var(--figma-color-text, #000); }

    #last-time {
      color: var(--figma-color-text-tertiary, #999);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* ── Log ── */
    #log-wrap {
      flex: 1;
      overflow: hidden;
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--figma-color-border, #e5e5e5);
    }
    #log-wrap.open { display: flex; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .log-entry {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      height: 28px;
      border-bottom: 1px solid var(--figma-color-border, #f0f0f0);
      flex-shrink: 0;
    }
    .log-entry:last-child { border-bottom: none; }

    .log-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .log-dot.cmd  { background: #f7a100; }
    .log-dot.ok   { background: #1bc47d; }
    .log-dot.err  { background: #f24e1e; }
    .log-dot.info { background: #ccc; }

    .log-cmd {
      flex: 1;
      font-weight: 500;
      color: var(--figma-color-text, #000);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-info-text { color: var(--figma-color-text-secondary, #666); font-weight: normal; }

    .log-ts {
      color: var(--figma-color-text-tertiary, #999);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    #empty {
      padding: 16px 12px;
      text-align: center;
      color: var(--figma-color-text-tertiary, #999);
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="connection">
      <div id="status-dot" class="connecting"></div>
      <span id="status-text">Connecting...</span>
      <button id="reconnect-btn" onclick="if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;} connect()">Reconnect</button>
    </div>
    <button id="toggle-btn" onclick="toggleHistory()">▾</button>
  </div>

  <hr />

  <div id="last-row">
    <div id="last-status-dot"></div>
    <span id="last-cmd-text">—</span>
    <span id="last-time"></span>
  </div>

  <!-- Expandable history -->
  <div id="log-wrap">
    <div id="log">
      <div id="empty">No commands yet</div>
    </div>
  </div>

<script>
  const BRIDGE_URL = "ws://localhost:3846";
  const MAX_LOG = 50;
  const RECONNECT_DELAY = 3000;
  const PING_INTERVAL = 10000;
  const HEIGHT_EXPANDED = 340;

  let ws = null;
  let logEntries = [];
  let reconnectTimer = null;
  let pingTimer = null;
  let intentionalClose = false;
  let historyOpen = false;

  // ── Status ────────────────────────────────────────────────────────────────

  function setStatus(state, text) {
    document.getElementById("status-dot").className = state;
    document.getElementById("status-text").textContent = text;
    document.getElementById("reconnect-btn").style.display =
      state === "disconnected" ? "inline-block" : "none";
  }

  // ── Last command ──────────────────────────────────────────────────────────

  function updateLastCommand(entry) {
    const dot  = document.getElementById("last-status-dot");
    const cmd  = document.getElementById("last-cmd-text");
    const time = document.getElementById("last-time");

    dot.className = entry.type === "cmd" ? "pending"
                  : entry.type === "ok"  ? "ok"
                  : entry.type === "err" ? "err"
                  : "";

    cmd.textContent = entry.command;
    cmd.classList.toggle("active", entry.type !== "info");
    time.textContent = entry.time;
  }

  // ── History toggle ────────────────────────────────────────────────────────

  function collapsedHeight() {
    return document.getElementById("last-row").getBoundingClientRect().bottom + 1;
  }

  function resize(height) {
    parent.postMessage({ pluginMessage: { type: "resize", height: Math.ceil(height) } }, "*");
  }

  function updateToggle() {
    const btn = document.getElementById("toggle-btn");
    btn.disabled = logEntries.length <= 1;
  }

  function toggleHistory() {
    if (logEntries.length <= 1) return;
    historyOpen = !historyOpen;
    document.getElementById("log-wrap").classList.toggle("open", historyOpen);
    document.getElementById("toggle-btn").classList.toggle("open", historyOpen);
    resize(historyOpen ? HEIGHT_EXPANDED : collapsedHeight());
  }

  // ── Log ───────────────────────────────────────────────────────────────────

  function addLog(type, command, detail) {
    const now = new Date();
    const time = now.toLocaleTimeString("en", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const entry = { type, command, detail, time };
    logEntries.unshift(entry);
    if (logEntries.length > MAX_LOG) logEntries.pop();
    updateLastCommand(entry);
    updateToggle();
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById("log");
    if (logEntries.length === 0) {
      el.innerHTML = '<div id="empty">No commands yet</div>';
      return;
    }
    el.innerHTML = logEntries.slice(1).map(e => `
      <div class="log-entry">
        <div class="log-dot ${e.type}"></div>
        <span class="log-cmd ${e.type === 'info' ? 'log-info-text' : ''}">${e.command}</span>
        <span class="log-ts">${e.time}</span>
      </div>
    `).join("");
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, RECONNECT_DELAY);
  }

  function connect() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
    intentionalClose = false;
    setStatus("connecting", "Connecting...");
    ws = new WebSocket(BRIDGE_URL);

    ws.onopen = () => {
      setStatus("connected", "Bridge connected");
      addLog("info", "connected", null);
      if (pingTimer) clearInterval(pingTimer);
      pingTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
      }, PING_INTERVAL);
    };

    ws.onclose = (event) => {
      ws = null;
      if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
      if (intentionalClose) return;
      setStatus("disconnected", "Disconnected");
      addLog("err", "disconnected", `code ${event.code}`);
      scheduleReconnect();
    };

    ws.onerror = () => {};

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }
      addLog("cmd", msg.command, null);
      parent.postMessage({ pluginMessage: msg }, "*");
    };
  }

  // ── Main thread responses ─────────────────────────────────────────────────

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg || !msg.id) return;
    if (msg.error) {
      addLog("err", `✕ ${msg.id.slice(0, 6)}`, msg.error.slice(0, 60));
    } else {
      addLog("ok", `✓ done`, null);
    }
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
  };

  connect();

  window.addEventListener("load", () => {
    updateToggle();
    resize(collapsedHeight());
  });
</script>
</body>
</html>
